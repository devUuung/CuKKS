name: Benchmark

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      model:
        description: "Model to benchmark (leave empty for all)"
        required: false
        type: string

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cukks
        run: pip install -e .

      - name: Run benchmarks
        run: |
          if [ -n "${{ inputs.model }}" ]; then
            python benchmarks/run_benchmarks.py --model ${{ inputs.model }} --output benchmark-results.json
          else
            python benchmarks/run_benchmarks.py --output benchmark-results.json
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.json
