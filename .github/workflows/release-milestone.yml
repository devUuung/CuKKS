name: Release From Milestone

on:
  workflow_dispatch:
    inputs:
      milestone_name:
        description: Closed milestone title to release (used as the release version)
        required: true
        type: string
      target_ref:
        description: Git ref to release from
        required: true
        default: main
        type: string
      draft:
        description: Keep the GitHub release as draft after publishing
        required: true
        default: true
        type: boolean
      publish_pypi:
        description: Publish packages to PyPI after draft release creation
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: release-milestone-${{ inputs.milestone_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      release_title: ${{ steps.meta.outputs.release_title }}
      milestone_title: ${{ steps.validate.outputs.milestone_title }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Set release metadata
        id: meta
        run: |
          echo "version=${{ inputs.milestone_name }}" >> "$GITHUB_OUTPUT"
          echo "tag=v${{ inputs.milestone_name }}" >> "$GITHUB_OUTPUT"
          echo "release_title=v${{ inputs.milestone_name }}" >> "$GITHUB_OUTPUT"

      - name: Validate milestone and generate release notes
        id: validate
        env:
          GH_TOKEN: ${{ github.token }}
          MILESTONE_NAME: ${{ inputs.milestone_name }}
          TARGET_REF: ${{ inputs.target_ref }}
          REPOSITORY: ${{ github.repository }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          repo = os.environ["REPOSITORY"]
          milestone_name = os.environ["MILESTONE_NAME"]
          version = milestone_name
          target_ref = os.environ["TARGET_REF"]

          def gh_json(*args):
              out = subprocess.check_output(["gh", *args], text=True)
              return json.loads(out)

          milestones = gh_json("api", f"repos/{repo}/milestones?state=closed&per_page=100")
          milestone = next((item for item in milestones if item["title"] == milestone_name), None)
          if milestone is None:
              raise SystemExit(f"Closed milestone '{milestone_name}' not found")
          milestone_number = milestone["number"]
          if milestone["state"] != "closed":
              raise SystemExit(f"Milestone '{milestone_name}' must be closed before release")

          subprocess.check_call(["git", "fetch", "origin", target_ref, "--tags"])
          subprocess.check_call(["git", "merge-base", "--is-ancestor", f"origin/{target_ref}", "HEAD"])

          items = gh_json("api", f"repos/{repo}/issues?milestone={milestone_number}&state=closed&per_page=100")
          prs = []
          issues = []
          for item in items:
              if "pull_request" in item:
                  pr = gh_json(
                      "pr",
                      "view",
                      str(item["number"]),
                      "--repo",
                      repo,
                      "--json",
                      "number,title,url,mergedAt,baseRefName,state",
                  )
                  if not pr.get("mergedAt"):
                      raise SystemExit(f"PR #{item['number']} is in milestone but not merged")
                  if pr.get("baseRefName") != "main":
                      raise SystemExit(f"PR #{item['number']} targets {pr.get('baseRefName')}, expected main")
                  prs.append(pr)
              else:
                  issues.append(item)

          if not prs:
              raise SystemExit(f"Milestone '{milestone_name}' has no merged PRs to release")

          lines = [
              f"## {milestone['title']}",
              "",
              f"Milestone: {milestone['title']} (#{milestone_number})",
              "",
              "### Merged Pull Requests",
          ]
          for pr in sorted(prs, key=lambda item: item["number"]):
              lines.append(f"- #{pr['number']} {pr['title']} ({pr['url']})")

          if issues:
              lines.extend(["", "### Closed Issues"])
              for issue in sorted(issues, key=lambda item: item["number"]):
                  lines.append(f"- #{issue['number']} {issue['title']} ({issue['html_url']})")

          with open("release-notes.md", "w", encoding="utf-8") as fh:
              fh.write("\n".join(lines) + "\n")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"milestone_title={milestone['title']}\n")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  prepare_release_commit:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_sha: ${{ steps.release-sha.outputs.release_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0

      - name: Sync tracked version files to release version
        run: |
          python scripts/set_release_version.py "${{ needs.validate.outputs.version }}" --write

      - name: Configure git author for release prep commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release prep commit when version files changed
        run: |
          if ! git diff --quiet; then
            git add pyproject.toml cukks-cu118/pyproject.toml cukks-cu121/pyproject.toml cukks-cu124/pyproject.toml cukks-cu128/pyproject.toml bindings/openfhe_backend/pyproject.toml cukks/__init__.py
            git commit -m "release: v${{ needs.validate.outputs.version }}"
            git push origin HEAD:${{ inputs.target_ref }}
          fi

      - name: Record release commit SHA
        id: release-sha
        run: echo "release_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  ensure_tag:
    needs:
      - validate
      - prepare_release_commit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release_commit.outputs.release_sha }}
          fetch-depth: 0

      - name: Configure git author for release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure annotated tag points to release commit
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          RELEASE_SHA="${{ needs.prepare_release_commit.outputs.release_sha }}"
          tag_sha="$(git ls-remote --tags origin "refs/tags/${TAG}^{}" | cut -f1)"

          if [ -z "$tag_sha" ]; then
            git tag -a "$TAG" "$RELEASE_SHA" -m "Release $TAG"
            git push origin "refs/tags/$TAG"
          elif [ "$tag_sha" != "$RELEASE_SHA" ]; then
            echo "Tag $TAG already exists at $tag_sha, expected $RELEASE_SHA"
            exit 1
          fi

  publish_packages:
    if: ${{ inputs.publish_pypi }}
    needs:
      - validate
      - ensure_tag
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/publish-packages.yml
    with:
      ref: ${{ needs.validate.outputs.tag }}
      publish_pypi: false
    secrets: inherit

  build_gpu:
    if: ${{ inputs.publish_pypi && needs.publish_packages.result == 'success' }}
    needs:
      - validate
      - publish_packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_version: "118"
            cuda_path: "11.8"
            cuda_arch: "70;75;80;86;89;90"
            package_dir: "cukks-cu118"
            gcc_toolset: "11"
          - cuda_version: "121"
            cuda_path: "12.1"
            cuda_arch: "70;75;80;86;89;90"
            package_dir: "cukks-cu121"
            gcc_toolset: "12"
          - cuda_version: "124"
            cuda_path: "12.4"
            cuda_arch: "70;75;80;86;89;90"
            package_dir: "cukks-cu124"
            gcc_toolset: "13"
          - cuda_version: "128"
            cuda_path: "12.8"
            cuda_arch: "70;75;80;86;89;90;120"
            package_dir: "cukks-cu128"
            gcc_toolset: "13"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Get lowercase repo name
        id: repo
        run: echo "lowercase=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build GPU wheels (CUDA ${{ matrix.cuda_version }})
        uses: pypa/cibuildwheel@v2.21.3
        with:
          package-dir: ${{ matrix.package_dir }}
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: ghcr.io/${{ steps.repo.outputs.lowercase }}/manylinux-cuda${{ matrix.cuda_version }}:${{ github.sha }}
          CIBW_BEFORE_ALL_LINUX: |
            set -ex
            git config --global --unset-all http.https://github.com/.extraheader || true
            git config --global url.https://github.com/.insteadOf git@github.com: || true
            rm -rf /project/cnmem
            mkdir -p /project/cnmem
            curl -fsSL https://codeload.github.com/NVIDIA/cnmem/tar.gz/refs/heads/master | tar -xz --strip-components=1 -C /project/cnmem
            echo "CC=$CC CXX=$CXX CUDA_HOME=$CUDA_HOME"
            echo "PATH=$PATH"
            $CC --version
            nvcc --version || echo "nvcc not found"
            cd /project/openfhe-gpu-public
            mkdir -p build && cd build
            cmake .. \
                -DWITH_CUDA=ON \
                -DWITH_OPENMP=ON \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_C_COMPILER=$CC \
                -DCMAKE_CXX_COMPILER=$CXX \
                -DBUILD_SHARED=ON \
                -DBUILD_EXAMPLES=OFF \
                -DBUILD_UNITTESTS=OFF \
                -DCMAKE_CUDA_ARCHITECTURES="${{ matrix.cuda_arch }}" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                -DFETCHCONTENT_SOURCE_DIR_CNMEM=/project/cnmem \
                -DOPENFHE_SKIP_EXPORT=ON
            make -j$(nproc) OPENFHEcore OPENFHEpke OPENFHEbinfhe
            mkdir -p /usr/local/lib /usr/local/include/openfhe
            cp -a lib/*.so* /usr/local/lib/
            cp -a ../src/core/include/* /usr/local/include/
            cp -a ../src/pke/include/* /usr/local/include/
            cp -a ../src/binfhe/include/* /usr/local/include/
            cp -a src/core/config_core.h /usr/local/include/openfhe/
            ldconfig
          CIBW_ENVIRONMENT_LINUX: >
            OPENFHE_GPU_ROOT=/project/openfhe-gpu-public
            OPENFHE_GPU_BUILD_DIR=/project/openfhe-gpu-public/build
            CUDA_HOME=/usr/local/cuda-${{ matrix.cuda_path }}
            PATH=/usr/local/cuda-${{ matrix.cuda_path }}/bin:/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin:$PATH
            LD_LIBRARY_PATH=/usr/local/cuda-${{ matrix.cuda_path }}/lib64:/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/lib64:$LD_LIBRARY_PATH
            CC=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/gcc
            CXX=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/g++
            CUDAHOSTCXX=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/g++
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: auditwheel repair -w {dest_dir} {wheel} --exclude libcuda.so.1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-gpu-cu${{ matrix.cuda_version }}
          path: wheelhouse/*.whl

  test_gpu:
    if: ${{ inputs.publish_pypi && needs.build_gpu.result == 'success' }}
    needs:
      - build_gpu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ["118", "121", "124", "128"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-gpu-cu${{ matrix.cuda_version }}
          path: wheelhouse

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test GPU wheel structure (CUDA ${{ matrix.cuda_version }}, Python ${{ matrix.python-version }})
        run: |
          set -ex
          PY_VER=$(echo "${{ matrix.python-version }}" | tr -d '.')
          python -m venv test-env
          source test-env/bin/activate
          pip install wheelhouse/*cp${PY_VER}*.whl

          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          test -f "$SITE_PACKAGES/ckks/__init__.py"
          test -f "$SITE_PACKAGES/ckks/torch_api.py"
          test -f "$SITE_PACKAGES/ckks/backends/__init__.py"
          ls "$SITE_PACKAGES/ckks/backends/"ckks_openfhe_backend.cpython-*.so
          ls "$SITE_PACKAGES/ckks/backends/"ckks_openfhe_gpu_backend.cpython-*.so

  publish_main:
    if: ${{ inputs.publish_pypi && needs.publish_packages.result == 'success' }}
    needs:
      - validate
      - publish_packages
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-main
          path: dist

      - name: Publish cukks to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish_gpu:
    if: ${{ inputs.publish_pypi && needs.publish_packages.result == 'success' && needs.test_gpu.result == 'success' }}
    needs:
      - validate
      - publish_packages
      - test_gpu
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ["118", "121", "124", "128"]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-gpu-cu${{ matrix.cuda_version }}
          path: dist

      - name: Publish cukks-cu${{ matrix.cuda_version }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  finalize_release:
    if: ${{ !cancelled() && needs.ensure_tag.result == 'success' && (needs.publish_packages.result == 'success' || needs.publish_packages.result == 'skipped') && (needs.build_gpu.result == 'success' || needs.build_gpu.result == 'skipped') && (needs.test_gpu.result == 'success' || needs.test_gpu.result == 'skipped') && (needs.publish_main.result == 'success' || needs.publish_main.result == 'skipped') && (needs.publish_gpu.result == 'success' || needs.publish_gpu.result == 'skipped') }}
    needs:
      - validate
      - ensure_tag
      - publish_packages
      - build_gpu
      - test_gpu
      - publish_main
      - publish_gpu
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Upsert canonical GitHub release for this tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          TITLE="${{ needs.validate.outputs.release_title }}"
          REPO="${{ github.repository }}"
          release_ids="$(gh api "repos/$REPO/releases?per_page=100" --paginate --jq '.[] | select(.tag_name=="'"$TAG"'") | .id')"
          count="$(printf '%s\n' "$release_ids" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [ "$count" -gt 1 ]; then
            echo "Multiple releases already exist for $TAG"
            printf '%s\n' "$release_ids"
            exit 1
          elif [ "$count" -eq 0 ]; then
            gh release create "$TAG" \
              --repo "$REPO" \
              --draft \
              --title "$TITLE" \
              --notes-file release-notes.md
            release_id="$(gh api "repos/$REPO/releases?per_page=100" --paginate --jq '.[] | select(.tag_name=="'"$TAG"'") | .id')"
          else
            release_id="$release_ids"
          fi

          gh api "repos/$REPO/releases/$release_id" -X PATCH \
            -f name="$TITLE" \
            -f tag_name="$TAG" \
            -F body=@release-notes.md

      - name: Publish draft release when requested
        if: ${{ !inputs.draft }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          REPO="${{ github.repository }}"
          release_id="$(gh api "repos/$REPO/releases?per_page=100" --paginate --jq '.[] | select(.tag_name=="'"$TAG"'") | .id')"
          gh api "repos/$REPO/releases/${release_id}" -X PATCH \
            -f draft=false \
            -f make_latest=true
