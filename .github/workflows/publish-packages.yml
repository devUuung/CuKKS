name: Publish Packages

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to publish from
        required: true
        type: string
      publish_pypi:
        description: Publish packages to PyPI
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish from
        required: true
        default: main
        type: string
      publish_pypi:
        description: Publish packages to PyPI
        required: true
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: publish-packages-${{ inputs.ref }}
  cancel-in-progress: false

jobs:
  derive-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Derive release version from checked-out source
        id: version
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path('pyproject.toml').read_text())
          version = data['project']['version']
          with open(Path(os.environ['GITHUB_OUTPUT']), 'a', encoding='utf-8') as fh:
              fh.write(f'version={version}\n')
          PY

      - name: Validate package versions against derived release version
        run: |
          python scripts/set_release_version.py "${{ steps.version.outputs.version }}"

  preflight-pypi:
    if: ${{ inputs.publish_pypi }}
    needs: derive-version
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any target package version already exists on PyPI
        run: |
          python - <<'PY'
          import sys
          import urllib.error
          import urllib.request

          version = "${{ needs.derive-version.outputs.version }}"
          packages = [
              "cukks",
              "cukks-cu118",
              "cukks-cu121",
              "cukks-cu124",
              "cukks-cu128",
          ]

          existing = []
          for package in packages:
              url = f"https://pypi.org/pypi/{package}/{version}/json"
              try:
                  with urllib.request.urlopen(url) as response:
                      if response.status == 200:
                          existing.append(package)
              except urllib.error.HTTPError as exc:
                  if exc.code != 404:
                      raise

          if existing:
              print(f"PyPI already has version {version} for: {', '.join(existing)}")
              sys.exit(1)

          print(f"PyPI preflight OK for version {version}")
          PY

  preflight-ghcr:
    needs: derive-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Fail if any target GHCR CUDA image version tag already exists
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          VERSION: ${{ needs.derive-version.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          import subprocess
          import sys

          owner = os.environ['OWNER']
          version = os.environ['VERSION']
          existing = []

          for cuda in ('118', '121', '124', '128'):
              package_name = f'manylinux-cuda{cuda}'
              result = subprocess.run(
                  [
                      'gh', 'api',
                      f'/users/{owner}/packages/container/{package_name}/versions',
                      '--paginate'
                  ],
                  capture_output=True,
                  text=True,
              )
              if result.returncode != 0:
                  continue
              versions = json.loads(result.stdout or '[]')
              for item in versions:
                  for tag in item.get('metadata', {}).get('container', {}).get('tags', []):
                      if tag == f'v{version}':
                          existing.append(f'{package_name}:v{version}')
                          break

          if existing:
              print('GHCR image tags already exist:')
              for item in existing:
                  print(f'- {item}')
              sys.exit(1)

          print(f'GHCR preflight OK for v{version}')
          PY

  build-docker:
    needs:
      - derive-version
      - preflight-pypi
      - preflight-ghcr
    if: ${{ always() && needs.derive-version.result == 'success' && needs.preflight-ghcr.result == 'success' && (needs.preflight-pypi.result == 'success' || needs.preflight-pypi.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ["118", "121", "124", "128"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Get lowercase repo name
        id: repo
        run: echo "lowercase=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CUDA ${{ matrix.cuda_version }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/manylinux-cuda${{ matrix.cuda_version }}.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.lowercase }}/manylinux-cuda${{ matrix.cuda_version }}:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.lowercase }}/manylinux-cuda${{ matrix.cuda_version }}:v${{ needs.derive-version.outputs.version }}
          cache-from: type=gha,scope=publish-cuda${{ matrix.cuda_version }}
          cache-to: type=gha,mode=max,scope=publish-cuda${{ matrix.cuda_version }},ignore-error=true

  build-gpu:
    needs: build-docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - cuda_version: "118"
            cuda_path: "11.8"
            cuda_arch: "70;75;80;86;89;90"
            package_dir: "cukks-cu118"
            gcc_toolset: "11"
          - cuda_version: "121"
            cuda_path: "12.1"
            cuda_arch: "70;75;80;86;89;90"
            package_dir: "cukks-cu121"
            gcc_toolset: "12"
          - cuda_version: "124"
            cuda_path: "12.4"
            cuda_arch: "70;75;80;86;89;90"
            package_dir: "cukks-cu124"
            gcc_toolset: "13"
          - cuda_version: "128"
            cuda_path: "12.8"
            cuda_arch: "70;75;80;86;89;90;120"
            package_dir: "cukks-cu128"
            gcc_toolset: "13"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Get lowercase repo name
        id: repo
        run: echo "lowercase=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build GPU wheels (CUDA ${{ matrix.cuda_version }})
        uses: pypa/cibuildwheel@v2.21.3
        with:
          package-dir: ${{ matrix.package_dir }}
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: ghcr.io/${{ steps.repo.outputs.lowercase }}/manylinux-cuda${{ matrix.cuda_version }}:${{ github.sha }}
          CIBW_BEFORE_ALL_LINUX: |
            set -ex
            echo "CC=$CC CXX=$CXX CUDA_HOME=$CUDA_HOME"
            echo "PATH=$PATH"
            $CC --version
            nvcc --version || echo "nvcc not found"
            cd /project/openfhe-gpu-public
            mkdir -p build && cd build
            cmake .. \
                -DWITH_CUDA=ON \
                -DWITH_OPENMP=ON \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_C_COMPILER=$CC \
                -DCMAKE_CXX_COMPILER=$CXX \
                -DBUILD_SHARED=ON \
                -DBUILD_EXAMPLES=OFF \
                -DBUILD_UNITTESTS=OFF \
                -DCMAKE_CUDA_ARCHITECTURES="${{ matrix.cuda_arch }}" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                -DOPENFHE_SKIP_EXPORT=ON
            make -j$(nproc) OPENFHEcore OPENFHEpke OPENFHEbinfhe
            mkdir -p /usr/local/lib /usr/local/include/openfhe
            cp -a lib/*.so* /usr/local/lib/
            cp -a ../src/core/include/* /usr/local/include/
            cp -a ../src/pke/include/* /usr/local/include/
            cp -a ../src/binfhe/include/* /usr/local/include/
            cp -a src/core/config_core.h /usr/local/include/openfhe/
            ldconfig
          CIBW_ENVIRONMENT_LINUX: >
            OPENFHE_GPU_ROOT=/project/openfhe-gpu-public
            OPENFHE_GPU_BUILD_DIR=/project/openfhe-gpu-public/build
            CUDA_HOME=/usr/local/cuda-${{ matrix.cuda_path }}
            PATH=/usr/local/cuda-${{ matrix.cuda_path }}/bin:/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin:$PATH
            LD_LIBRARY_PATH=/usr/local/cuda-${{ matrix.cuda_path }}/lib64:/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/lib64:$LD_LIBRARY_PATH
            CC=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/gcc
            CXX=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/g++
            CUDAHOSTCXX=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/g++
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: auditwheel repair -w {dest_dir} {wheel} --exclude libcuda.so.1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-gpu-cu${{ matrix.cuda_version }}
          path: wheelhouse/*.whl

  test-gpu:
    needs: build-gpu
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ["118", "121", "124", "128"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-gpu-cu${{ matrix.cuda_version }}
          path: wheelhouse

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test GPU wheel structure (CUDA ${{ matrix.cuda_version }}, Python ${{ matrix.python-version }})
        run: |
          set -ex
          PY_VER=$(echo "${{ matrix.python-version }}" | tr -d '.')
          python -m venv test-env
          source test-env/bin/activate
          pip install wheelhouse/*cp${PY_VER}*.whl

          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          test -f "$SITE_PACKAGES/ckks/__init__.py"
          test -f "$SITE_PACKAGES/ckks/torch_api.py"
          test -f "$SITE_PACKAGES/ckks/backends/__init__.py"
          ls "$SITE_PACKAGES/ckks/backends/"ckks_openfhe_backend.cpython-*.so
          ls "$SITE_PACKAGES/ckks/backends/"ckks_openfhe_gpu_backend.cpython-*.so

  build-main:
    needs: derive-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build main cukks package
        run: |
          pip install build
          CUKKS_NO_BACKEND=1 python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-main
          path: dist/*

  publish-main:
    if: ${{ inputs.publish_pypi }}
    needs:
      - build-main
      - test-gpu
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-main
          path: dist

      - name: Publish cukks to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-gpu:
    if: ${{ inputs.publish_pypi }}
    needs:
      - build-main
      - test-gpu
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ["118", "121", "124", "128"]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-gpu-cu${{ matrix.cuda_version }}
          path: dist

      - name: Publish cukks-cu${{ matrix.cuda_version }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
