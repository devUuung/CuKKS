name: Build Wheels

on:
  push:
    branches: [main]
    tags-ignore: ['**']
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-wheels-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      run_ci: ${{ steps.filter.outputs.run_ci }}
      build_gpu_matrix: ${{ steps.set-matrix.outputs.build_gpu_matrix }}
      test_gpu_cuda_versions: ${{ steps.set-matrix.outputs.test_gpu_cuda_versions }}
      test_gpu_python_versions: ${{ steps.set-matrix.outputs.test_gpu_python_versions }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run_ci:
              - '!.github/ISSUE_TEMPLATE/**'
              - '!.github/pull_request_template.md'
              - '!**/*.md'
              - '**'

      - name: Select CI matrices for this event
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.event.head_commit.message || '' }}" == release:* ]]; then
            echo 'build_gpu_matrix=[]' >> "$GITHUB_OUTPUT"
            echo 'test_gpu_cuda_versions=[]' >> "$GITHUB_OUTPUT"
            echo 'test_gpu_python_versions=[]' >> "$GITHUB_OUTPUT"
            echo 'run_ci=false' >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo 'build_gpu_matrix=[{"cuda_version":"121","cuda_path":"12.1","cuda_arch":"70;75;80;86;89;90","package_dir":"cukks-cu121","gcc_toolset":"12"},{"cuda_version":"128","cuda_path":"12.8","cuda_arch":"70;75;80;86;89;90;120","package_dir":"cukks-cu128","gcc_toolset":"13"}]' >> "$GITHUB_OUTPUT"
            echo 'test_gpu_cuda_versions=["121","128"]' >> "$GITHUB_OUTPUT"
            echo 'test_gpu_python_versions=["3.11","3.12"]' >> "$GITHUB_OUTPUT"
            echo 'run_ci=true' >> "$GITHUB_OUTPUT"
          else
            echo 'build_gpu_matrix=[{"cuda_version":"118","cuda_path":"11.8","cuda_arch":"70;75;80;86;89;90","package_dir":"cukks-cu118","gcc_toolset":"11"},{"cuda_version":"121","cuda_path":"12.1","cuda_arch":"70;75;80;86;89;90","package_dir":"cukks-cu121","gcc_toolset":"12"},{"cuda_version":"124","cuda_path":"12.4","cuda_arch":"70;75;80;86;89;90","package_dir":"cukks-cu124","gcc_toolset":"13"},{"cuda_version":"128","cuda_path":"12.8","cuda_arch":"70;75;80;86;89;90;120","package_dir":"cukks-cu128","gcc_toolset":"13"}]' >> "$GITHUB_OUTPUT"
            echo 'test_gpu_cuda_versions=["118","121","124","128"]' >> "$GITHUB_OUTPUT"
            echo 'test_gpu_python_versions=["3.10","3.11","3.12","3.13"]' >> "$GITHUB_OUTPUT"
            echo 'run_ci=true' >> "$GITHUB_OUTPUT"
          fi

  build-docker:
    needs: setup
    if: needs.setup.outputs.run_ci == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ["118", "121", "124", "128"]
    steps:
      - uses: actions/checkout@v4

      - name: Get lowercase repo name
        id: repo
        run: echo "lowercase=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push CUDA ${{ matrix.cuda_version }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/manylinux-cuda${{ matrix.cuda_version }}.Dockerfile
          push: true
          tags: ghcr.io/${{ steps.repo.outputs.lowercase }}/manylinux-cuda${{ matrix.cuda_version }}:${{ github.sha }}
          cache-from: type=gha,scope=cuda${{ matrix.cuda_version }}
          cache-to: type=gha,mode=max,scope=cuda${{ matrix.cuda_version }},ignore-error=true

  build-gpu:
    needs: [setup, build-docker]
    if: needs.setup.outputs.run_ci == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.build_gpu_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Get lowercase repo name
        id: repo
        run: echo "lowercase=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build GPU wheels (CUDA ${{ matrix.cuda_version }})
        uses: pypa/cibuildwheel@v2.21.3
        with:
          package-dir: ${{ matrix.package_dir }}
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: ghcr.io/${{ steps.repo.outputs.lowercase }}/manylinux-cuda${{ matrix.cuda_version }}:${{ github.sha }}
          CIBW_BEFORE_ALL_LINUX: |
            set -ex
            echo "CC=$CC CXX=$CXX CUDA_HOME=$CUDA_HOME"
            echo "PATH=$PATH"
            $CC --version
            nvcc --version || echo "nvcc not found"
            cd /project/openfhe-gpu-public
            mkdir -p build && cd build
            cmake .. \
                -DWITH_CUDA=ON \
                -DWITH_OPENMP=ON \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_C_COMPILER=$CC \
                -DCMAKE_CXX_COMPILER=$CXX \
                -DBUILD_SHARED=ON \
                -DBUILD_EXAMPLES=OFF \
                -DBUILD_UNITTESTS=OFF \
                -DCMAKE_CUDA_ARCHITECTURES="${{ matrix.cuda_arch }}" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                -DOPENFHE_SKIP_EXPORT=ON
            make -j$(nproc) OPENFHEcore OPENFHEpke OPENFHEbinfhe
            mkdir -p /usr/local/lib /usr/local/include/openfhe
            cp -a lib/*.so* /usr/local/lib/
            cp -a ../src/core/include/* /usr/local/include/
            cp -a ../src/pke/include/* /usr/local/include/
            cp -a ../src/binfhe/include/* /usr/local/include/
            cp -a src/core/config_core.h /usr/local/include/openfhe/
            ldconfig
          CIBW_ENVIRONMENT_LINUX: >
            OPENFHE_GPU_ROOT=/project/openfhe-gpu-public
            OPENFHE_GPU_BUILD_DIR=/project/openfhe-gpu-public/build
            CUDA_HOME=/usr/local/cuda-${{ matrix.cuda_path }}
            PATH=/usr/local/cuda-${{ matrix.cuda_path }}/bin:/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin:$PATH
            LD_LIBRARY_PATH=/usr/local/cuda-${{ matrix.cuda_path }}/lib64:/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/lib64:$LD_LIBRARY_PATH
            CC=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/gcc
            CXX=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/g++
            CUDAHOSTCXX=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/g++
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: auditwheel repair -w {dest_dir} {wheel} --exclude libcuda.so.1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-gpu-cu${{ matrix.cuda_version }}
          path: wheelhouse/*.whl

  build-gpu-pr:
    needs: setup
    if: needs.setup.outputs.run_ci == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.build_gpu_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local CUDA image for PR wheel job
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/manylinux-cuda${{ matrix.cuda_version }}.Dockerfile
          load: true
          tags: local/manylinux-cuda${{ matrix.cuda_version }}:${{ github.sha }}
          cache-from: type=gha,scope=pr-cuda${{ matrix.cuda_version }}
          cache-to: type=gha,mode=max,scope=pr-cuda${{ matrix.cuda_version }},ignore-error=true

      - name: Verify local CUDA image is available
        run: docker image inspect local/manylinux-cuda${{ matrix.cuda_version }}:${{ github.sha }} >/dev/null

      - name: Build GPU wheels for PR (CUDA ${{ matrix.cuda_version }})
        uses: pypa/cibuildwheel@v2.21.3
        with:
          package-dir: ${{ matrix.package_dir }}
        env:
          CIBW_MANYLINUX_X86_64_IMAGE: local/manylinux-cuda${{ matrix.cuda_version }}:${{ github.sha }}
          CIBW_BEFORE_ALL_LINUX: |
            set -ex
            echo "CC=$CC CXX=$CXX CUDA_HOME=$CUDA_HOME"
            echo "PATH=$PATH"
            $CC --version
            nvcc --version || echo "nvcc not found"
            cd /project/openfhe-gpu-public
            mkdir -p build && cd build
            cmake .. \
                -DWITH_CUDA=ON \
                -DWITH_OPENMP=ON \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr/local \
                -DCMAKE_C_COMPILER=$CC \
                -DCMAKE_CXX_COMPILER=$CXX \
                -DBUILD_SHARED=ON \
                -DBUILD_EXAMPLES=OFF \
                -DBUILD_UNITTESTS=OFF \
                -DCMAKE_CUDA_ARCHITECTURES="${{ matrix.cuda_arch }}" \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                -DOPENFHE_SKIP_EXPORT=ON
            make -j$(nproc) OPENFHEcore OPENFHEpke OPENFHEbinfhe
            mkdir -p /usr/local/lib /usr/local/include/openfhe
            cp -a lib/*.so* /usr/local/lib/
            cp -a ../src/core/include/* /usr/local/include/
            cp -a ../src/pke/include/* /usr/local/include/
            cp -a ../src/binfhe/include/* /usr/local/include/
            cp -a src/core/config_core.h /usr/local/include/openfhe/
            ldconfig
          CIBW_ENVIRONMENT_LINUX: >
            OPENFHE_GPU_ROOT=/project/openfhe-gpu-public
            OPENFHE_GPU_BUILD_DIR=/project/openfhe-gpu-public/build
            CUDA_HOME=/usr/local/cuda-${{ matrix.cuda_path }}
            PATH=/usr/local/cuda-${{ matrix.cuda_path }}/bin:/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin:$PATH
            LD_LIBRARY_PATH=/usr/local/cuda-${{ matrix.cuda_path }}/lib64:/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/lib64:$LD_LIBRARY_PATH
            CC=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/gcc
            CXX=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/g++
            CUDAHOSTCXX=/opt/rh/gcc-toolset-${{ matrix.gcc_toolset }}/root/usr/bin/g++
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: auditwheel repair -w {dest_dir} {wheel} --exclude libcuda.so.1

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-gpu-cu${{ matrix.cuda_version }}
          path: wheelhouse/*.whl

  test-gpu:
    needs: [setup, build-gpu]
    if: needs.setup.outputs.run_ci == 'true' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ${{ fromJson(needs.setup.outputs.test_gpu_cuda_versions) }}
        python-version: ${{ fromJson(needs.setup.outputs.test_gpu_python_versions) }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-gpu-cu${{ matrix.cuda_version }}
          path: wheelhouse

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test GPU wheel structure (CUDA ${{ matrix.cuda_version }}, Python ${{ matrix.python-version }})
        run: |
          set -ex
          PY_VER=$(echo "${{ matrix.python-version }}" | tr -d '.')
          python -m venv test-env
          source test-env/bin/activate
          pip install wheelhouse/*cp${PY_VER}*.whl

          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "Checking installed package at: $SITE_PACKAGES/ckks"

          test -f "$SITE_PACKAGES/ckks/__init__.py"
          test -f "$SITE_PACKAGES/ckks/torch_api.py"
          test -f "$SITE_PACKAGES/ckks/backends/__init__.py"
          ls "$SITE_PACKAGES/ckks/backends/"ckks_openfhe_backend.cpython-*.so
          ls "$SITE_PACKAGES/ckks/backends/"ckks_openfhe_gpu_backend.cpython-*.so

          echo "All required files present for CUDA ${{ matrix.cuda_version }}, Python ${{ matrix.python-version }}!"
          echo "Note: Import test skipped - requires CUDA drivers (libcuda.so.1)"

  test-gpu-pr:
    needs: [setup, build-gpu-pr]
    if: needs.setup.outputs.run_ci == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda_version: ${{ fromJson(needs.setup.outputs.test_gpu_cuda_versions) }}
        python-version: ${{ fromJson(needs.setup.outputs.test_gpu_python_versions) }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels-gpu-cu${{ matrix.cuda_version }}
          path: wheelhouse

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Test PR GPU wheel structure (CUDA ${{ matrix.cuda_version }}, Python ${{ matrix.python-version }})
        run: |
          set -ex
          PY_VER=$(echo "${{ matrix.python-version }}" | tr -d '.')
          python -m venv test-env
          source test-env/bin/activate
          pip install wheelhouse/*cp${PY_VER}*.whl

          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          test -f "$SITE_PACKAGES/ckks/__init__.py"
          test -f "$SITE_PACKAGES/ckks/torch_api.py"
          test -f "$SITE_PACKAGES/ckks/backends/__init__.py"
          ls "$SITE_PACKAGES/ckks/backends/"ckks_openfhe_backend.cpython-*.so
          ls "$SITE_PACKAGES/ckks/backends/"ckks_openfhe_gpu_backend.cpython-*.so

  build-main:
    needs: setup
    if: needs.setup.outputs.run_ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build main cukks package
        run: |
          pip install build
          CUKKS_NO_BACKEND=1 python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-main
          path: dist/*
